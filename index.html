<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q Archive — Research Database</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap');

:root {
  --bg-primary: #0d0f12;
  --bg-secondary: #131619;
  --bg-card: #181c21;
  --bg-elevated: #1e2329;
  --bg-hover: #232830;
  --border: #2a3040;
  --border-bright: #3a4558;
  --text-primary: #d4cfc8;
  --text-secondary: #8a8f9a;
  --text-dim: #555d6b;
  --text-bright: #eae6df;
  --accent-amber: #c8943a;
  --accent-amber-dim: #7a5820;
  --accent-red: #9b3535;
  --accent-red-bright: #c44040;
  --accent-teal: #2e7a6e;
  --accent-teal-bright: #3da393;
  --accent-blue: #2e5a8a;
  --accent-blue-bright: #4a82c4;
  --accent-purple: #5a3a8a;
  --tag-fact: #1a3a2a;
  --tag-fact-text: #5aaa7a;
  --tag-theory: #2a1f3a;
  --tag-theory-text: #8a5acc;
  --tag-context: #1a2a3a;
  --tag-context-text: #4a8acc;
  --tag-question: #3a2a1a;
  --tag-question-text: #cc8a3a;
  --sidebar-w: 300px;
  --font-ui: 'Syne', sans-serif;
  --font-body: 'Lora', serif;
  --font-mono: 'Courier Prime', monospace;
  --radius: 6px;
  --radius-lg: 10px;
  --transition: 150ms ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── SCROLLBAR ────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-amber); }

/* ── LAYOUT ───────────────────────────── */
.app-shell { display: flex; min-height: 100vh; }

.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: transform var(--transition);
}

.main-content {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

/* ── SIDEBAR HEADER ───────────────────── */
.sidebar-header {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg-secondary);
  z-index: 10;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.logo-mark {
  width: 32px;
  height: 32px;
  background: var(--accent-amber);
  color: var(--bg-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ui);
  font-weight: 800;
  font-size: 16px;
  border-radius: 4px;
  letter-spacing: -1px;
}

.logo-text {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 15px;
  color: var(--text-bright);
  letter-spacing: 0.5px;
}

.logo-sub {
  font-family: var(--font-ui);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 1px;
}

.search-wrap { position: relative; }

.search-input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 13px;
  padding: 8px 10px 8px 32px;
  outline: none;
  transition: border-color var(--transition);
}

.search-input:focus { border-color: var(--accent-amber); }
.search-input::placeholder { color: var(--text-dim); }

.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 13px;
  pointer-events: none;
}

/* ── SIDEBAR NAV ─────────────────────── */
.sidebar-nav {
  padding: 12px 10px;
  border-bottom: 1px solid var(--border);
}

.nav-label {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 0 8px;
  margin-bottom: 6px;
}

.nav-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 7px 10px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-ui);
  font-size: 13px;
  text-align: left;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
}

.nav-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-btn.active { background: var(--bg-elevated); color: var(--accent-amber); }

.nav-btn .icon { font-size: 14px; width: 16px; }

/* ── DROP LIST ───────────────────────── */
.drop-list-section {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.drop-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background var(--transition);
  border: 1px solid transparent;
  margin-bottom: 2px;
}

.drop-item:hover { background: var(--bg-hover); }
.drop-item.active { background: var(--bg-elevated); border-color: var(--accent-amber-dim); }
.drop-item.bookmarked .drop-num::after { content: '★'; color: var(--accent-amber); font-size: 9px; margin-left: 3px; }

.drop-num {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 11px;
  color: var(--accent-amber);
  background: var(--accent-amber-dim);
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
  min-width: 38px;
  text-align: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.drop-preview {
  flex: 1;
  min-width: 0;
}

.drop-preview-date {
  font-family: var(--font-ui);
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 2px;
}

.drop-preview-text {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

/* ── SIDEBAR FOOTER ──────────────────── */
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}

.btn-sm {
  flex: 1;
  padding: 6px 10px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: var(--font-ui);
  font-size: 11px;
  cursor: pointer;
  transition: all var(--transition);
  text-align: center;
}

.btn-sm:hover { border-color: var(--accent-amber); color: var(--accent-amber); }

/* ── TOP BAR ─────────────────────────── */
.topbar {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-nav {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: var(--font-ui);
  font-size: 12px;
  cursor: pointer;
  transition: all var(--transition);
}

.btn-nav:hover:not(:disabled) { border-color: var(--accent-amber); color: var(--accent-amber); }
.btn-nav:disabled { opacity: 0.35; cursor: default; }

.topbar-info {
  font-family: var(--font-ui);
  font-size: 12px;
  color: var(--text-dim);
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-icon {
  width: 30px;
  height: 30px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all var(--transition);
}

.btn-icon:hover { border-color: var(--accent-amber); color: var(--accent-amber); }
.btn-icon.active { border-color: var(--accent-amber); color: var(--accent-amber); background: var(--accent-amber-dim); }

/* ── CONTENT AREA ────────────────────── */
.content-area {
  flex: 1;
  padding: 28px 32px;
  max-width: 960px;
  margin: 0 auto;
  width: 100%;
}

/* ── HOME VIEW ───────────────────────── */
.home-hero {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--bg-card);
  padding: 36px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}

.home-hero::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 300px; height: 200px;
  background: radial-gradient(ellipse at top right, rgba(200,148,58,0.08), transparent);
  pointer-events: none;
}

.hero-eyebrow {
  font-family: var(--font-ui);
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--accent-amber);
  margin-bottom: 12px;
}

.hero-title {
  font-family: var(--font-ui);
  font-weight: 800;
  font-size: 28px;
  color: var(--text-bright);
  line-height: 1.2;
  margin-bottom: 12px;
}

.hero-desc {
  color: var(--text-secondary);
  font-size: 14px;
  max-width: 580px;
  line-height: 1.7;
  margin-bottom: 20px;
}

.disclaimer-box {
  background: rgba(155, 53, 53, 0.12);
  border: 1px solid rgba(155, 53, 53, 0.4);
  border-radius: var(--radius);
  padding: 14px 16px;
  font-size: 13px;
  color: #cc7070;
  line-height: 1.6;
}

.disclaimer-box strong { color: #e07070; }

.home-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 28px;
}

.home-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}

.home-card-title {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 13px;
  color: var(--text-bright);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 7px;
}

.home-card-title .icon { color: var(--accent-amber); }

.abbr-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
}

.abbr-item {
  display: flex;
  gap: 6px;
  font-size: 12px;
  padding: 4px 0;
}

.abbr-key {
  font-family: var(--font-mono);
  font-weight: 700;
  color: var(--accent-amber);
  white-space: nowrap;
  min-width: 52px;
}

.abbr-val { color: var(--text-secondary); }

.tag-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tag-chip {
  font-family: var(--font-ui);
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
}

.tag-chip:hover, .tag-chip.active {
  border-color: var(--accent-amber);
  color: var(--accent-amber);
  background: var(--accent-amber-dim);
}

/* ── DROP CARD VIEW ──────────────────── */
.drop-page { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }

.drop-header {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px 28px;
  margin-bottom: 20px;
}

.drop-header-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.drop-badge {
  font-family: var(--font-ui);
  font-weight: 800;
  font-size: 20px;
  color: var(--accent-amber);
}

.meta-pill {
  font-family: var(--font-ui);
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.meta-pill.platform { border-color: var(--accent-teal); color: var(--accent-teal-bright); }
.meta-pill.date { color: var(--text-dim); }

.drop-title {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 18px;
  color: var(--text-bright);
  margin-bottom: 8px;
}

.drop-summary {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.drop-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.theme-tag {
  font-family: var(--font-ui);
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--bg-elevated);
  color: var(--text-dim);
  border: 1px solid var(--border);
}

/* ── RAW TEXT BLOCK ──────────────────── */
.section-block {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 16px;
  overflow: hidden;
}

.section-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
}

.section-toggle:hover { background: var(--bg-hover); }

.section-toggle-label {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-toggle-label .icon { color: var(--accent-amber); font-size: 13px; }
.section-caret { color: var(--text-dim); transition: transform 0.2s; }
.section-caret.open { transform: rotate(180deg); }

.section-body { padding: 0 20px 18px; }

.raw-text {
  font-family: var(--font-mono);
  font-size: 13.5px;
  line-height: 1.9;
  color: var(--text-primary);
  white-space: pre-wrap;
  word-break: break-word;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}

/* ── LINE-BY-LINE ANALYSIS ───────────── */
.line-analysis-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
}

.line-analysis-header:hover { background: var(--bg-hover); }

.line-item {
  border-top: 1px solid var(--border);
}

.line-trigger {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 20px;
  cursor: pointer;
  transition: background var(--transition);
}

.line-trigger:hover { background: var(--bg-hover); }
.line-trigger.open { background: var(--bg-elevated); }

.line-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  padding-top: 2px;
  min-width: 20px;
  flex-shrink: 0;
}

.line-text {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-primary);
  flex: 1;
  line-height: 1.6;
}

.line-caret {
  font-size: 11px;
  color: var(--text-dim);
  padding-top: 2px;
  flex-shrink: 0;
  transition: transform 0.2s;
}

.line-caret.open { transform: rotate(180deg); color: var(--accent-amber); }

.line-panel {
  display: none;
  padding: 0 20px 16px 50px;
  animation: fadeIn 0.15s ease;
}

.line-panel.open { display: block; }

.analysis-grid {
  display: grid;
  gap: 10px;
}

.analysis-block {
  border-radius: var(--radius);
  padding: 12px 14px;
  font-size: 13px;
  line-height: 1.65;
}

.analysis-block.fact {
  background: var(--tag-fact);
  border: 1px solid rgba(90,170,122,0.25);
}

.analysis-block.theory {
  background: var(--tag-theory);
  border: 1px solid rgba(138,90,204,0.25);
}

.analysis-block.context {
  background: var(--tag-context);
  border: 1px solid rgba(74,138,204,0.25);
}

.analysis-block.question {
  background: var(--tag-question);
  border: 1px solid rgba(204,138,58,0.25);
}

.analysis-block-label {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.fact .analysis-block-label { color: var(--tag-fact-text); }
.theory .analysis-block-label { color: var(--tag-theory-text); }
.context .analysis-block-label { color: var(--tag-context-text); }
.question .analysis-block-label { color: var(--tag-question-text); }

.analysis-block p { color: var(--text-secondary); }

.source-links {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.source-link {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--accent-teal-bright);
  text-decoration: none;
  border: 1px solid var(--accent-teal);
  padding: 2px 8px;
  border-radius: 20px;
  transition: background var(--transition);
}

.source-link:hover { background: var(--accent-teal); color: #fff; }

.confidence-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text-dim);
}

.confidence-bar {
  flex: 1;
  height: 4px;
  background: var(--bg-elevated);
  border-radius: 2px;
  overflow: hidden;
}

.confidence-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent-amber);
}

/* ── RELATED DROPS ───────────────────── */
.related-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.related-pill {
  font-family: var(--font-ui);
  font-size: 12px;
  padding: 5px 12px;
  border-radius: var(--radius);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--accent-amber);
  cursor: pointer;
  transition: all var(--transition);
}

.related-pill:hover { background: var(--accent-amber-dim); border-color: var(--accent-amber); }

/* ── NOTES AREA ──────────────────────── */
.notes-textarea {
  width: 100%;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 13px;
  padding: 12px 14px;
  resize: vertical;
  min-height: 90px;
  outline: none;
  line-height: 1.6;
  transition: border-color var(--transition);
}

.notes-textarea:focus { border-color: var(--accent-amber); }
.notes-textarea::placeholder { color: var(--text-dim); }

.notes-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 8px;
  gap: 8px;
}

.btn-primary {
  padding: 6px 14px;
  border-radius: var(--radius);
  border: none;
  background: var(--accent-amber);
  color: var(--bg-primary);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity var(--transition);
}

.btn-primary:hover { opacity: 0.85; }

.btn-secondary {
  padding: 6px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-ui);
  font-size: 12px;
  cursor: pointer;
  transition: all var(--transition);
}

.btn-secondary:hover { border-color: var(--accent-red-bright); color: var(--accent-red-bright); }

/* ── TIMELINE VIEW ───────────────────── */
.timeline-view { display: none; }
.timeline-view.active { display: block; }

.timeline-item {
  display: flex;
  gap: 16px;
  padding-bottom: 20px;
  position: relative;
}

.timeline-item::before {
  content: '';
  position: absolute;
  left: 60px;
  top: 22px;
  bottom: -20px;
  width: 1px;
  background: var(--border);
}

.timeline-item:last-child::before { display: none; }

.timeline-date {
  width: 44px;
  text-align: right;
  flex-shrink: 0;
  padding-top: 14px;
}

.timeline-date-day {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 16px;
  color: var(--accent-amber);
  line-height: 1;
}

.timeline-date-mon {
  font-family: var(--font-ui);
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.timeline-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent-amber);
  flex-shrink: 0;
  margin-top: 18px;
  position: relative;
  z-index: 1;
}

.timeline-card {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
}

.timeline-card:hover { border-color: var(--accent-amber-dim); background: var(--bg-elevated); }

.timeline-card-num {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 12px;
  color: var(--accent-amber);
  margin-bottom: 4px;
}

.timeline-card-preview {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── FILTER BAR ──────────────────────── */
.filter-bar {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  margin-bottom: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-label {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  flex-shrink: 0;
}

.filter-select {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-secondary);
  font-family: var(--font-ui);
  font-size: 12px;
  padding: 5px 10px;
  outline: none;
  cursor: pointer;
}

.filter-select:focus { border-color: var(--accent-amber); }

/* ── LOADING / EMPTY ─────────────────── */
.loading-state, .empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-family: var(--font-ui);
}

.loading-state .spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent-amber);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.empty-state-icon { font-size: 40px; margin-bottom: 12px; }

/* ── TOAST ───────────────────────────── */
.toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  font-family: var(--font-ui);
  font-size: 12px;
  color: var(--text-primary);
  animation: slideIn 0.2s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}

@keyframes slideIn { from { transform: translateX(40px); opacity:0; } to { opacity:1; transform:none; } }

/* ── MOBILE ──────────────────────────── */
.menu-toggle {
  display: none;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 5px 8px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 16px;
}

@media (max-width: 768px) {
  .menu-toggle { display: flex; align-items: center; }
  .sidebar {
    position: fixed;
    left: 0; top: 0;
    transform: translateX(-100%);
    z-index: 200;
  }
  .sidebar.open { transform: none; }
  .content-area { padding: 16px; }
  .home-grid { grid-template-columns: 1fr; }
  .abbr-grid { grid-template-columns: 1fr; }
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 150;
  }
  .sidebar-overlay.open { display: block; }
}

/* ── PROGRESS TRACKER ────────────────── */
.progress-bar-outer {
  height: 3px;
  background: var(--border);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 999;
}

.progress-bar-inner {
  height: 100%;
  background: var(--accent-amber);
  transition: width 0.3s ease;
}

/* ── ABBREVIATIONS PAGE ──────────────── */
.abbr-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.abbr-table th {
  font-family: var(--font-ui);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}

.abbr-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.abbr-table tr:hover td { background: var(--bg-hover); }

.abbr-table .abbr-col {
  font-family: var(--font-mono);
  font-weight: 700;
  color: var(--accent-amber);
  white-space: nowrap;
}

.abbr-table .meaning-col { color: var(--text-primary); }
.abbr-table .note-col { color: var(--text-dim); font-size: 12px; }

.certainty-badge {
  font-family: var(--font-ui);
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 20px;
}

.certainty-badge.confirmed { background: var(--tag-fact); color: var(--tag-fact-text); }
.certainty-badge.likely { background: var(--tag-context); color: var(--tag-context-text); }
.certainty-badge.disputed { background: var(--tag-question); color: var(--tag-question-text); }
.certainty-badge.unknown { background: var(--bg-elevated); color: var(--text-dim); }
</style>
</head>
<body>

<div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="app-shell">
  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-mark">Q</div>
        <div>
          <div class="logo-text">Q Archive</div>
          <div class="logo-sub">Research Database</div>
        </div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="searchInput" type="text" placeholder="Search drops, topics…" oninput="handleSearch(this.value)">
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-label">Navigate</div>
      <button class="nav-btn active" id="navHome" onclick="showView('home')">
        <span class="icon">⌂</span> Home
      </button>
      <button class="nav-btn" id="navTimeline" onclick="showView('timeline')">
        <span class="icon">◑</span> Timeline
      </button>
      <button class="nav-btn" id="navAbbrv" onclick="showView('abbr')">
        <span class="icon">≡</span> Abbreviations
      </button>
      <button class="nav-btn" id="navBookmarks" onclick="showView('bookmarks')">
        <span class="icon">★</span> Bookmarks
      </button>
    </nav>

    <div class="drop-list-section" id="dropList">
      <div class="loading-state"><div class="spinner"></div>Loading drops…</div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-sm" onclick="refreshIndex()" title="Reload manifest and drop list">⟳ Refresh</button>
      <button class="btn-sm" onclick="exportNotes()">↓ Export Notes</button>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="main-content">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <div class="topbar-nav">
          <button class="btn-nav" id="btnPrev" onclick="navigateDrop(-1)" disabled>← Prev</button>
          <button class="btn-nav" id="btnNext" onclick="navigateDrop(1)" disabled>Next →</button>
        </div>
        <span class="topbar-info" id="dropPosition"></span>
      </div>
      <div class="topbar-actions">
        <button class="btn-icon" id="bookmarkBtn" onclick="toggleBookmark()" title="Bookmark this drop">☆</button>
        <button class="btn-icon" onclick="toggleReadMode()" title="Reading mode">⊙</button>
        <button class="btn-icon" onclick="window.print()" title="Print">⎙</button>
      </div>
    </header>

    <div class="content-area" id="contentArea">
      <div class="loading-state"><div class="spinner"></div><p>Initialising archive…</p></div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
const STATE = {
  manifest: null,
  drops: {},          // num → data
  dropOrder: [],      // ordered list of drop numbers
  currentDrop: null,
  currentView: 'home',
  bookmarks: new Set(JSON.parse(localStorage.getItem('q_bookmarks') || '[]')),
  notes: JSON.parse(localStorage.getItem('q_notes') || '{}'),
  readMode: false,
  openLinePanel: null,  // currently open line index within a drop
  openSections: {},
};

/* ══════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════ */
async function boot() {
  await loadManifest();
}

async function loadManifest() {
  try {
    const res = await fetch('manifest.json');
    if (!res.ok) throw new Error('manifest.json not found');
    STATE.manifest = await res.json();
    STATE.dropOrder = STATE.manifest.drops.map(d => d.num);
    renderDropList(STATE.manifest.drops);
    await preloadDrops();
    showView('home');
  } catch (e) {
    // Fallback: try bundled data
    if (typeof BUNDLED_DATA !== 'undefined') {
      STATE.manifest = BUNDLED_DATA.manifest;
      STATE.dropOrder = STATE.manifest.drops.map(d => d.num);
      STATE.drops = BUNDLED_DATA.drops;
      renderDropList(STATE.manifest.drops);
      showView('home');
    } else {
      showOfflineFallback();
    }
  }
}

async function preloadDrops() {
  const promises = STATE.manifest.drops.map(async (meta) => {
    try {
      const res = await fetch(meta.file);
      if (!res.ok) return;
      STATE.drops[meta.num] = await res.json();
    } catch {}
  });
  await Promise.all(promises);
}

async function loadDrop(num) {
  if (STATE.drops[num]) return STATE.drops[num];
  const meta = STATE.manifest?.drops.find(d => d.num === num);
  if (!meta) return null;
  try {
    const res = await fetch(meta.file);
    if (!res.ok) return null;
    STATE.drops[num] = await res.json();
    return STATE.drops[num];
  } catch {
    return null;
  }
}

function showOfflineFallback() {
  document.getElementById('contentArea').innerHTML = `
    <div class="home-hero">
      <div class="hero-eyebrow">Setup Required</div>
      <div class="hero-title">Offline Mode</div>
      <p class="hero-desc">
        Browsers restrict loading local JSON files via <code>file://</code>. To use this archive, choose one of these options:
      </p>
      <div class="home-card" style="margin-top:16px;">
        <div class="home-card-title"><span class="icon">🖥</span> Option 1 — Local Server (Recommended)</div>
        <p style="font-size:13px;color:var(--text-secondary);line-height:1.7;">
          Run a simple local server from this folder:<br>
          <code style="background:var(--bg-elevated);padding:4px 8px;border-radius:4px;font-size:12px;display:inline-block;margin-top:6px;">python3 -m http.server 8000</code><br>
          Then open <a href="http://localhost:8000" style="color:var(--accent-amber);">http://localhost:8000</a>
        </p>
      </div>
      <div class="home-card" style="margin-top:12px;">
        <div class="home-card-title"><span class="icon">📂</span> Option 2 — Load Folder</div>
        <p style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">Use the file picker to select the archive folder containing all JSON files.</p>
        <button class="btn-primary" onclick="openFilePicker()">Select Archive Folder…</button>
      </div>
    </div>
  `;
  document.getElementById('dropList').innerHTML = '<div class="empty-state"><div>No drops loaded</div></div>';
}

async function openFilePicker() {
  try {
    const dirHandle = await window.showDirectoryPicker();
    const manifestHandle = await dirHandle.getFileHandle('manifest.json');
    const manifestFile = await manifestHandle.getFile();
    STATE.manifest = JSON.parse(await manifestFile.text());
    STATE.dropOrder = STATE.manifest.drops.map(d => d.num);
    for (const meta of STATE.manifest.drops) {
      try {
        const fh = await dirHandle.getFileHandle(meta.file);
        const f = await fh.getFile();
        STATE.drops[meta.num] = JSON.parse(await f.text());
      } catch {}
    }
    renderDropList(STATE.manifest.drops);
    showView('home');
    toast('Archive loaded from folder.');
  } catch (e) {
    toast('Folder access cancelled or not supported.');
  }
}

function refreshIndex() {
  STATE.drops = {};
  STATE.manifest = null;
  loadManifest();
  toast('Index refreshed.');
}

/* ══════════════════════════════════════════════════════
   DROP LIST SIDEBAR
══════════════════════════════════════════════════════ */
function renderDropList(drops, highlight = '') {
  const list = document.getElementById('dropList');
  if (!drops || !drops.length) {
    list.innerHTML = '<div class="empty-state"><div>No drops found</div></div>';
    return;
  }
  list.innerHTML = drops.map(d => {
    const isBookmarked = STATE.bookmarks.has(d.num);
    const isActive = STATE.currentDrop === d.num;
    const preview = d.preview || '';
    return `
      <div class="drop-item${isActive ? ' active' : ''}${isBookmarked ? ' bookmarked' : ''}"
           id="sideitem-${d.num}"
           onclick="openDrop(${d.num})">
        <div class="drop-num">#${d.num}</div>
        <div class="drop-preview">
          <div class="drop-preview-date">${d.date || ''}</div>
          <div class="drop-preview-text">${highlight ? highlightText(preview, highlight) : preview}</div>
        </div>
      </div>
    `;
  }).join('');
}

function highlightText(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark style="background:var(--accent-amber-dim);color:var(--accent-amber);">$1</mark>');
}

/* ══════════════════════════════════════════════════════
   VIEWS
══════════════════════════════════════════════════════ */
function showView(view, ...args) {
  STATE.currentView = view;
  ['navHome','navTimeline','navAbbrv','navBookmarks'].forEach(id => {
    document.getElementById(id)?.classList.remove('active');
  });

  if (view === 'home') {
    document.getElementById('navHome')?.classList.add('active');
    renderHome();
    updateNavButtons(null);
  } else if (view === 'timeline') {
    document.getElementById('navTimeline')?.classList.add('active');
    renderTimeline();
    updateNavButtons(null);
  } else if (view === 'abbr') {
    document.getElementById('navAbbrv')?.classList.add('active');
    renderAbbreviations();
    updateNavButtons(null);
  } else if (view === 'bookmarks') {
    document.getElementById('navBookmarks')?.classList.add('active');
    renderBookmarks();
    updateNavButtons(null);
  } else if (view === 'drop') {
    openDrop(args[0]);
  }
}

function renderHome() {
  const ca = document.getElementById('contentArea');
  const totalDrops = STATE.manifest?.drops?.length || 0;
  const topics = STATE.manifest?.topics || [];
  ca.innerHTML = `
    <div class="drop-page">
      <div class="home-hero">
        <div class="hero-eyebrow">Research Archive · Proof of Concept v1.0</div>
        <div class="hero-title">Q / QAnon Drop Database</div>
        <p class="hero-desc">
          An investigative research archive of alleged Q drops. This tool is designed for deep reading, analysis, and navigation — not advocacy. Every claim is treated as <em>unverified</em> unless supported by documented evidence.
        </p>
        <div class="disclaimer-box">
          <strong>⚠ Research Disclaimer:</strong> This archive presents Q drops as historical claims and research material only. Content is not verified fact. Interpretations, theories, and analyses are labeled clearly. Verified information is separated from speculation. Use critical thinking. Consult primary sources.
        </div>
      </div>

      <div class="home-grid">
        <div class="home-card">
          <div class="home-card-title"><span class="icon">⌗</span> Quick Stats</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            ${statBox('Drops Loaded', totalDrops)}
            ${statBox('Bookmarks', STATE.bookmarks.size)}
            ${statBox('Notes', Object.keys(STATE.notes).length)}
            ${statBox('Source', 'qalerts.app')}
          </div>
        </div>
        <div class="home-card">
          <div class="home-card-title"><span class="icon">▤</span> How to Use</div>
          <ol style="font-size:12px;color:var(--text-secondary);line-height:1.8;padding-left:16px;">
            <li>Browse drops in the left sidebar or timeline</li>
            <li>Click any drop to open its full analysis</li>
            <li>Expand each line for fact/theory breakdown</li>
            <li>Use color coding: <span style="color:var(--tag-fact-text)">green=fact</span>, <span style="color:var(--tag-theory-text)">purple=theory</span>, <span style="color:var(--tag-context-text)">blue=context</span></li>
            <li>Bookmark drops with ★ in the top bar</li>
            <li>Add your own notes per drop</li>
          </ol>
        </div>
        <div class="home-card">
          <div class="home-card-title"><span class="icon">◐</span> Common Abbreviations</div>
          <div class="abbr-grid">
            ${(STATE.manifest?.abbreviations || FALLBACK_ABBR).slice(0,10).map(a =>
              `<div class="abbr-item"><span class="abbr-key">${a.abbr}</span><span class="abbr-val">${a.meaning}</span></div>`
            ).join('')}
          </div>
          <button class="btn-sm" style="margin-top:10px;width:100%;" onclick="showView('abbr')">View all abbreviations →</button>
        </div>
        <div class="home-card">
          <div class="home-card-title"><span class="icon">◈</span> Browse by Theme</div>
          <div class="tag-cloud" id="tagCloud">
            ${topics.map(t => `<span class="tag-chip" onclick="filterByTag('${t}')">${t}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
}

function statBox(label, val) {
  return `<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;">
    <div style="font-family:var(--font-ui);font-size:18px;font-weight:800;color:var(--accent-amber);">${val}</div>
    <div style="font-family:var(--font-ui);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;">${label}</div>
  </div>`;
}

function renderTimeline() {
  const ca = document.getElementById('contentArea');
  const drops = STATE.manifest?.drops || [];
  ca.innerHTML = `
    <div class="drop-page">
      <div class="home-hero" style="padding:20px 28px;margin-bottom:20px;">
        <div class="hero-eyebrow">Chronological View</div>
        <div class="hero-title" style="font-size:22px;">Timeline</div>
      </div>
      <div>
        ${drops.map(d => {
          const dt = new Date(d.date);
          const day = isNaN(dt) ? '?' : dt.getDate();
          const mon = isNaN(dt) ? '' : dt.toLocaleString('en',{month:'short'}).toUpperCase();
          return `
          <div class="timeline-item">
            <div class="timeline-date">
              <div class="timeline-date-day">${day}</div>
              <div class="timeline-date-mon">${mon}</div>
            </div>
            <div class="timeline-dot"></div>
            <div class="timeline-card" onclick="openDrop(${d.num})">
              <div class="timeline-card-num">Drop #${d.num} · ${d.platform||''}</div>
              <div class="timeline-card-preview">${d.preview||''}</div>
              <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
                ${(d.tags||[]).slice(0,3).map(t=>`<span class="theme-tag">${t}</span>`).join('')}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function renderAbbreviations() {
  const abbrs = STATE.manifest?.abbreviations || FALLBACK_ABBR;
  document.getElementById('contentArea').innerHTML = `
    <div class="drop-page">
      <div class="home-hero" style="padding:20px 28px;margin-bottom:20px;">
        <div class="hero-eyebrow">Reference Key</div>
        <div class="hero-title" style="font-size:22px;">Abbreviations & Terminology</div>
        <p class="hero-desc" style="margin-bottom:0;">Q drops use extensive shorthand. Meanings below are reference aids only — where meaning is uncertain or disputed, this is labeled explicitly.</p>
      </div>
      <div class="section-block">
        <div class="section-body" style="padding-top:16px;">
          <table class="abbr-table">
            <thead>
              <tr>
                <th>Abbreviation</th>
                <th>Meaning</th>
                <th>Category</th>
                <th>Certainty</th>
                <th>Notes</th>
              </tr>
            </thead>
            <tbody>
              ${abbrs.map(a => `
                <tr>
                  <td class="abbr-col">${a.abbr}</td>
                  <td class="meaning-col">${a.meaning}</td>
                  <td><span class="theme-tag">${a.category||'—'}</span></td>
                  <td><span class="certainty-badge ${a.certainty||'unknown'}">${a.certainty||'unknown'}</span></td>
                  <td class="note-col">${a.notes||'—'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function renderBookmarks() {
  const bms = [...STATE.bookmarks];
  if (!bms.length) {
    document.getElementById('contentArea').innerHTML = `
      <div class="home-hero">
        <div class="hero-title">Bookmarks</div>
        <p class="hero-desc">No bookmarks yet. Open a drop and click ☆ to bookmark it.</p>
      </div>`;
    return;
  }
  const drops = bms.map(n => STATE.manifest?.drops?.find(d=>d.num===n)).filter(Boolean);
  document.getElementById('contentArea').innerHTML = `
    <div class="drop-page">
      <div class="home-hero" style="padding:20px 28px;margin-bottom:20px;">
        <div class="hero-eyebrow">Saved</div>
        <div class="hero-title" style="font-size:22px;">Bookmarks (${drops.length})</div>
      </div>
      <div style="display:grid;gap:10px;">
        ${drops.map(d => `
          <div class="timeline-card" onclick="openDrop(${d.num})" style="cursor:pointer;">
            <div class="timeline-card-num">Drop #${d.num} · ${d.date||''}</div>
            <div class="timeline-card-preview">${d.preview||''}</div>
          </div>`).join('')}
      </div>
    </div>
  `;
}

/* ══════════════════════════════════════════════════════
   OPEN A DROP
══════════════════════════════════════════════════════ */
async function openDrop(num) {
  STATE.currentDrop = num;
  STATE.openLinePanel = null;
  updateNavButtons(num);
  updateBookmarkBtn(num);

  // Sidebar highlight
  document.querySelectorAll('.drop-item').forEach(el => el.classList.remove('active'));
  document.getElementById('sideitem-'+num)?.classList.add('active');
  document.getElementById('sideitem-'+num)?.scrollIntoView({block:'nearest'});

  const ca = document.getElementById('contentArea');
  ca.innerHTML = `<div class="loading-state"><div class="spinner"></div></div>`;

  const data = await loadDrop(num);
  if (!data) {
    ca.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠</div><div>Drop #${num} data not found.</div></div>`;
    return;
  }

  renderDrop(data);
  window.scrollTo(0,0);
}

function renderDrop(data) {
  const ca = document.getElementById('contentArea');
  const isBookmarked = STATE.bookmarks.has(data.drop_number);
  const savedNote = STATE.notes[data.drop_number] || '';
  const idx = STATE.dropOrder.indexOf(data.drop_number);
  document.getElementById('dropPosition').textContent =
    `Drop ${idx+1} of ${STATE.dropOrder.length}`;

  ca.innerHTML = `
  <div class="drop-page">
    <!-- HEADER -->
    <div class="drop-header">
      <div class="drop-header-meta">
        <span class="drop-badge">Drop #${data.drop_number}</span>
        <span class="meta-pill date">📅 ${data.datetime || 'Date unknown'}</span>
        <span class="meta-pill platform">🌐 ${data.platform || 'Unknown'}</span>
        ${data.tripcode ? `<span class="meta-pill">🔑 ${data.tripcode}</span>` : ''}
      </div>
      <div class="drop-title">${data.title || 'Untitled Drop'}</div>
      <div class="drop-summary">${data.summary || ''}</div>
      <div class="drop-tags">
        ${(data.themes || []).map(t => `<span class="theme-tag">${t}</span>`).join('')}
      </div>
    </div>

    <!-- RAW TEXT -->
    <div class="section-block">
      <div class="section-toggle" onclick="toggleSection('raw')">
        <span class="section-toggle-label"><span class="icon">⌨</span> Raw Drop Text</span>
        <span class="section-caret open" id="caret-raw">▾</span>
      </div>
      <div id="sect-raw" class="section-body">
        <pre class="raw-text">${escHtml(data.raw_text || '')}</pre>
      </div>
    </div>

    <!-- LINE-BY-LINE -->
    <div class="section-block">
      <div class="line-analysis-header" onclick="toggleSection('lines')">
        <span class="section-toggle-label"><span class="icon">⊞</span> Line-by-Line Analysis</span>
        <span style="display:flex;align-items:center;gap:10px;">
          <span style="font-family:var(--font-ui);font-size:11px;color:var(--text-dim);">${(data.lines||[]).length} lines</span>
          <span class="section-caret open" id="caret-lines">▾</span>
        </span>
      </div>
      <div id="sect-lines">
        ${renderLines(data.lines || [], data.drop_number)}
      </div>
    </div>

    <!-- RELATED DROPS -->
    ${data.related_drops?.length ? `
    <div class="section-block">
      <div class="section-toggle" onclick="toggleSection('related')">
        <span class="section-toggle-label"><span class="icon">↔</span> Related Drops</span>
        <span class="section-caret open" id="caret-related">▾</span>
      </div>
      <div id="sect-related" class="section-body">
        <div class="related-grid">
          ${data.related_drops.map(n => `<div class="related-pill" onclick="openDrop(${n})">Drop #${n}</div>`).join('')}
        </div>
      </div>
    </div>` : ''}

    <!-- SOURCES -->
    ${data.sources?.length ? `
    <div class="section-block">
      <div class="section-toggle" onclick="toggleSection('sources')">
        <span class="section-toggle-label"><span class="icon">⛓</span> Source References</span>
        <span class="section-caret open" id="caret-sources">▾</span>
      </div>
      <div id="sect-sources" class="section-body">
        <div style="display:grid;gap:8px;">
          ${data.sources.map(s => `
            <div style="font-size:13px;display:flex;gap:10px;align-items:flex-start;">
              <span style="color:var(--accent-amber);font-size:11px;padding-top:2px;">▶</span>
              <div>
                <div style="color:var(--text-primary);margin-bottom:2px;">${s.label}</div>
                ${s.url ? `<a class="source-link" href="${s.url}" target="_blank">${s.url}</a>` : ''}
                ${s.note ? `<div style="font-size:12px;color:var(--text-dim);margin-top:3px;">${s.note}</div>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>` : ''}

    <!-- NOTES -->
    <div class="section-block">
      <div class="section-toggle" onclick="toggleSection('notes')">
        <span class="section-toggle-label"><span class="icon">✎</span> Research Notes</span>
        <span class="section-caret open" id="caret-notes">▾</span>
      </div>
      <div id="sect-notes" class="section-body">
        <textarea class="notes-textarea" id="notesArea" placeholder="Add your research notes here…">${escHtml(savedNote)}</textarea>
        <div class="notes-footer">
          <button class="btn-secondary" onclick="clearNote(${data.drop_number})">Clear</button>
          <button class="btn-primary" onclick="saveNote(${data.drop_number})">Save Note</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderLines(lines, dropNum) {
  if (!lines.length) return '<div style="padding:14px 20px;color:var(--text-dim);font-size:13px;">No line analysis available.</div>';
  return lines.map((line, idx) => `
    <div class="line-item" id="line-${dropNum}-${idx}">
      <div class="line-trigger" onclick="toggleLine(${dropNum},${idx})">
        <span class="line-num">${idx+1}</span>
        <span class="line-text">${escHtml(line.text || '')}</span>
        <span class="line-caret" id="linecaret-${dropNum}-${idx}">▾</span>
      </div>
      <div class="line-panel" id="linepanel-${dropNum}-${idx}">
        <div class="analysis-grid">
          ${renderAnalysisBlock('fact', '✓ Verified / Documented', line.fact)}
          ${renderAnalysisBlock('theory', '◈ Interpretation / Theory', line.theory)}
          ${renderAnalysisBlock('context', '◎ Context & Background', line.context)}
          ${renderAnalysisBlock('question', '? Open Questions', line.questions)}
        </div>
        ${line.confidence != null ? `
          <div class="confidence-bar-wrap" style="margin-top:10px;">
            <span>Evidence confidence:</span>
            <div class="confidence-bar"><div class="confidence-fill" style="width:${line.confidence}%"></div></div>
            <span>${line.confidence}%</span>
          </div>` : ''}
        ${line.sources?.length ? `
          <div class="source-links" style="margin-top:10px;">
            ${line.sources.map(s=>`<a class="source-link" href="${s.url||'#'}" target="_blank">${s.label}</a>`).join('')}
          </div>` : ''}
      </div>
    </div>
  `).join('');
}

function renderAnalysisBlock(type, label, text) {
  if (!text) return '';
  return `
    <div class="analysis-block ${type}">
      <div class="analysis-block-label">${label}</div>
      <p>${text}</p>
    </div>`;
}

function toggleLine(dropNum, idx) {
  const panel = document.getElementById(`linepanel-${dropNum}-${idx}`);
  const caret = document.getElementById(`linecaret-${dropNum}-${idx}`);
  const trigger = panel?.previousElementSibling;

  // Close previously open panel
  if (STATE.openLinePanel !== null && STATE.openLinePanel !== idx) {
    const prev = document.getElementById(`linepanel-${dropNum}-${STATE.openLinePanel}`);
    const prevCaret = document.getElementById(`linecaret-${dropNum}-${STATE.openLinePanel}`);
    const prevTrigger = prev?.previousElementSibling;
    prev?.classList.remove('open');
    prevCaret?.classList.remove('open');
    prevTrigger?.classList.remove('open');
  }

  const isOpen = panel?.classList.contains('open');
  panel?.classList.toggle('open');
  caret?.classList.toggle('open');
  trigger?.classList.toggle('open');
  STATE.openLinePanel = isOpen ? null : idx;
}

function toggleSection(id) {
  const body = document.getElementById('sect-'+id);
  const caret = document.getElementById('caret-'+id);
  if (!body) return;
  const isHidden = body.style.display === 'none';
  body.style.display = isHidden ? '' : 'none';
  if (caret) {
    caret.classList.toggle('open', isHidden);
  }
}

/* ══════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════ */
function updateNavButtons(currentNum) {
  const idx = STATE.dropOrder.indexOf(currentNum);
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  if (btnPrev) btnPrev.disabled = idx <= 0;
  if (btnNext) btnNext.disabled = idx < 0 || idx >= STATE.dropOrder.length - 1;
}

function navigateDrop(delta) {
  const idx = STATE.dropOrder.indexOf(STATE.currentDrop);
  if (idx < 0) return;
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= STATE.dropOrder.length) return;
  openDrop(STATE.dropOrder[newIdx]);
}

/* ══════════════════════════════════════════════════════
   BOOKMARKS & NOTES
══════════════════════════════════════════════════════ */
function toggleBookmark() {
  const num = STATE.currentDrop;
  if (!num) return;
  if (STATE.bookmarks.has(num)) {
    STATE.bookmarks.delete(num);
    toast('Bookmark removed.');
  } else {
    STATE.bookmarks.add(num);
    toast('Bookmarked drop #' + num);
  }
  localStorage.setItem('q_bookmarks', JSON.stringify([...STATE.bookmarks]));
  updateBookmarkBtn(num);
  renderDropList(STATE.manifest?.drops || []);
}

function updateBookmarkBtn(num) {
  const btn = document.getElementById('bookmarkBtn');
  if (!btn) return;
  const active = STATE.bookmarks.has(num);
  btn.textContent = active ? '★' : '☆';
  btn.classList.toggle('active', active);
}

function saveNote(num) {
  const text = document.getElementById('notesArea')?.value || '';
  STATE.notes[num] = text;
  localStorage.setItem('q_notes', JSON.stringify(STATE.notes));
  toast('Note saved for drop #' + num);
}

function clearNote(num) {
  if (!confirm('Clear this note?')) return;
  delete STATE.notes[num];
  localStorage.setItem('q_notes', JSON.stringify(STATE.notes));
  if (document.getElementById('notesArea')) document.getElementById('notesArea').value = '';
  toast('Note cleared.');
}

function exportNotes() {
  const data = JSON.stringify({exported: new Date().toISOString(), notes: STATE.notes}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'q-archive-notes.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Notes exported.');
}

/* ══════════════════════════════════════════════════════
   SEARCH & FILTER
══════════════════════════════════════════════════════ */
let searchTimeout;
function handleSearch(q) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    if (!q.trim()) {
      renderDropList(STATE.manifest?.drops || []);
      return;
    }
    const ql = q.toLowerCase();
    const results = (STATE.manifest?.drops || []).filter(d => {
      const preview = (d.preview || '').toLowerCase();
      const tags = (d.tags || []).join(' ').toLowerCase();
      return preview.includes(ql) || tags.includes(ql) || String(d.num).includes(ql);
    });
    renderDropList(results, q);
  }, 200);
}

function filterByTag(tag) {
  const results = (STATE.manifest?.drops || []).filter(d => (d.tags||[]).includes(tag));
  renderDropList(results);
  document.getElementById('searchInput').value = tag;
  toast(`Filtered by tag: ${tag}`);
}

/* ══════════════════════════════════════════════════════
   UI HELPERS
══════════════════════════════════════════════════════ */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function toggleReadMode() {
  STATE.readMode = !STATE.readMode;
  document.body.style.setProperty('--sidebar-w', STATE.readMode ? '0px' : '300px');
  document.querySelector('.sidebar').style.display = STATE.readMode ? 'none' : '';
  toast(STATE.readMode ? 'Reading mode on' : 'Reading mode off');
}

function toast(msg, duration = 2500) {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft' || e.key === 'h') navigateDrop(-1);
  if (e.key === 'ArrowRight' || e.key === 'l') navigateDrop(1);
  if (e.key === 'b') toggleBookmark();
  if (e.key === '/') { e.preventDefault(); document.getElementById('searchInput').focus(); }
  if (e.key === 'Escape') document.getElementById('searchInput').blur();
});
