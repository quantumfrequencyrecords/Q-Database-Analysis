
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q Drops Research Archive</title>
<style>
:root{
--bg:#17191c;
--surface:#22262b;
--surface2:#2b3037;
--border:#3b414a;
--text:#d7d2ca;
--muted:#9aa0a8;
--accent:#c2a36b;
--accent2:#8a7350;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:Arial,sans-serif;
background:var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;
}
.layout{display:flex;height:100vh}
.sidebar{
width:320px;
background:var(--surface);
border-right:1px solid var(--border);
overflow-y:auto;
padding:20px;
}
.main{
flex:1;
overflow-y:auto;
padding:28px;
}
h1{color:var(--accent);margin-bottom:10px}
.panel{
background:var(--surface2);
border:1px solid var(--border);
border-radius:10px;
padding:16px;
margin-bottom:18px;
}
.file-label{
background:var(--accent2);
padding:10px 14px;
display:inline-block;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
input[type=file]{display:none}
.search{
width:100%;
margin-top:14px;
padding:10px;
background:#181b1f;
border:1px solid var(--border);
border-radius:8px;
color:var(--text);
}
.drop-item{
padding:12px;
margin-top:8px;
background:#1b1e22;
border-radius:8px;
cursor:pointer;
}
.drop-item:hover{
outline:1px solid var(--accent2);
}
.raw{
background:#121417;
padding:18px;
border-radius:10px;
white-space:pre-wrap;
font-family:monospace;
line-height:1.8;
}
.line{
padding:12px;
margin-top:10px;
background:var(--surface);
border-radius:8px;
cursor:pointer;
}
.analysis{
display:none;
margin-top:10px;
}
.analysis.open{
display:block;
}
.block{
margin-top:10px;
padding:12px;
border-radius:8px;
}
.fact{background:#1d2a21}
.theory{background:#231d34}
.context{background:#2b2618}
.label{
font-size:12px;
font-weight:bold;
margin-bottom:8px;
text-transform:uppercase;
}
ul{
margin-left:20px;
line-height:1.7;
}
</style>
</head>
<body>

<div class="layout">

<div class="sidebar">
<h1>Q Drops Archive</h1>

<div class="panel">
<label class="file-label">
Load JSON Files
<input type="file" id="fileInput" multiple accept=".json">
</label>

<input class="search" id="searchBox" placeholder="Search drops">
</div>

<div id="dropList"></div>
</div>

<div class="main">
<div class="panel">
Load one or many JSON files from your computer. Everything works offline.
</div>

<div id="contentArea"></div>
</div>

</div>

<script>

let drops = [];
let activeDrop = null;

const fileInput = document.getElementById('fileInput');
const dropList = document.getElementById('dropList');
const contentArea = document.getElementById('contentArea');
const searchBox = document.getElementById('searchBox');

fileInput.addEventListener('change', async (e) => {

    const files = [...e.target.files];

    for (const file of files){

        try{
            const text = await file.text();
            const json = JSON.parse(text);

            if(json.number){
                drops.push(json);
            } else if(json.drops){
                drops.push(...json.drops);
            }

        } catch(err){
            console.log(err);
        }
    }

    drops.sort((a,b)=>a.number-b.number);

    renderDropList();
});

searchBox.addEventListener('input', renderDropList);

function renderDropList(){

    dropList.innerHTML = '';

    const q = searchBox.value.toLowerCase();

    drops.filter(d=>JSON.stringify(d).toLowerCase().includes(q))
    .forEach(drop => {

        const div = document.createElement('div');
        div.className = 'drop-item';

        div.innerHTML = `
        <strong>Drop #${drop.number}</strong><br>
        <small>${drop.date || ''}</small>
        `;

        div.onclick = () => {
            activeDrop = drop;
            renderDrop(drop);
        };

        dropList.appendChild(div);
    });
}

function renderDrop(drop){

    contentArea.innerHTML = '';

    const top = document.createElement('div');

    top.innerHTML = `
    <h1>Drop #${drop.number}</h1>

    <div class="panel">
    <div>${drop.intro || ''}</div>
    </div>

    <div class="panel">
    <div class="raw">${escapeHtml(drop.rawText || '')}</div>
    </div>
    `;

    contentArea.appendChild(top);

    if(drop.lines){

        drop.lines.forEach(line => {

            const div = document.createElement('div');

            div.className = 'line';

            div.innerHTML = `
            <div>${escapeHtml(line.text || '')}</div>

            <div class="analysis">

                ${line.context ? `
                <div class="block context">
                <div class="label">Context</div>
                ${escapeHtml(line.context)}
                </div>` : ''}

                ${line.facts ? `
                <div class="block fact">
                <div class="label">Facts</div>
                <ul>
                ${line.facts.map(f=>`<li>${escapeHtml(f)}</li>`).join('')}
                </ul>
                </div>` : ''}

                ${line.theories ? `
                <div class="block theory">
                <div class="label">Theories</div>
                <ul>
                ${line.theories.map(t=>`<li>${escapeHtml(t)}</li>`).join('')}
                </ul>
                </div>` : ''}
            </div>
            `;

            div.onclick = () => {

                document.querySelectorAll('.analysis.open').forEach(a=>{
                    if(a !== div.querySelector('.analysis')){
                        a.classList.remove('open');
                    }
                });

                div.querySelector('.analysis').classList.toggle('open');
            };

            contentArea.appendChild(div);
        });
    }
}

function escapeHtml(str){
    return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

</script>

</body>
</html>
